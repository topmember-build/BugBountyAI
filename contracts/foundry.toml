[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fmt]
line_length = 100
tab_width = 4

# Arc Testnet (EVM-compatible)
# Update chain_id to match Arc Testnet's actual chain ID when deploying
[rpc_endpoints]
arc_testnet = "${ESCROW_RPC_URL}"

[etherscan]
arc_testnet = { key = "${ETHERSCAN_API_KEY}", url = "${ESCROW_BLOCK_EXPLORER_URL}" }
